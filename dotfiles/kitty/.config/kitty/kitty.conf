# ===== Font =====
font_family      MesloLGS Nerd Font
bold_font        MesloLGS Nerd Font Bold
italic_font      MesloLGS Nerd Font Italic
bold_italic_font MesloLGS Nerd Font Bold Italic
font_size 12.0
adjust_line_height 110%
disable_ligatures cursor

# ===== Cursor =====
cursor_shape block
cursor_blink_interval 0
shell_integration enabled

# ===== Scrollback =====
scrollback_lines 10000
scrollback_pager_history_size 100

# ===== Mouse =====
copy_on_select clipboard
mouse_hide_wait 3.0
url_style curly
open_url_with default
detect_urls yes

# ===== Performance =====
repaint_delay 10
input_delay 3
sync_to_monitor yes

# ===== Background opacity =====
background_opacity 0.95

# ===== Window =====
window_padding_width 8
placement_strategy center
hide_window_decorations no
confirm_os_window_close 0
remember_window_size yes
enabled_layouts splits,tall,fat,grid,stack

# ===== Tab bar =====
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{index}: {title}"
active_tab_font_style bold
inactive_tab_font_style normal

# ===== macOS =====
macos_option_as_alt yes
macos_titlebar_color background
macos_quit_when_last_window_closed yes
macos_traditional_fullscreen yes

# ===== Shell =====
shell /bin/zsh --login
editor .

# ===== Keybindings =====
# Splits
map cmd+d launch --location=vsplit --cwd=current
map cmd+shift+d launch --location=hsplit --cwd=current
map cmd+w close_window

# Navigate splits
map cmd+shift+h neighboring_window left
map cmd+shift+l neighboring_window right
map cmd+shift+k neighboring_window up
map cmd+shift+j neighboring_window down

# Resize splits
map cmd+shift+left resize_window narrower 3
map cmd+shift+right resize_window wider 3
map cmd+shift+up resize_window taller 3
map cmd+shift+down resize_window shorter 3

# Tabs
map cmd+t new_tab_with_cwd
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# Fuzzy finder
map cmd+p launch --type=overlay --cwd=current sh -c 'selected=$(/opt/homebrew/bin/fzf --border=rounded --margin=1,2 --padding=1 --preview="cat -n {}" --preview-window=right:50%:border-left --prompt="❯ " --pointer="▶" --header="Open file" --color=bg+:#303030,fg+:#f5f5f5,hl:#e5b566,hl+:#e5b566,border:#505050) && [ -n "$selected" ] && open "$selected"'

# Scrollback search (fuzzy)
map cmd+f launch --type=overlay --stdin-source=@screen_scrollback sh -c '/opt/homebrew/bin/fzf --no-sort --tac --border=rounded --margin=1,2 --padding=1 --prompt="❯ " --pointer="▶" --header="Search scrollback" --color=bg+:#303030,fg+:#f5f5f5,hl:#e5b566,hl+:#e5b566,border:#505050'

# URL/path hints
map cmd+e open_url_with_hints
map cmd+shift+e kitten hints --type path --program @

# Scrollback
map cmd+k clear_terminal scrollback active

# Font size
map cmd+equal change_font_size all +1.0
map cmd+minus change_font_size all -1.0
map cmd+0 change_font_size all 0

# Zoom current split (toggle stack layout)
map cmd+shift+z toggle_layout stack

# ===== Theme =====
background  #202020
foreground  #d0d0d0
cursor      #d0d0d0
selection_foreground #202020
selection_background #303030

# Normal colors
color0  #151515
color1  #ac4142
color2  #7e8d50
color3  #e5b566
color4  #6c99ba
color5  #9e4e85
color6  #7dd5cf
color7  #d0d0d0

# Bright colors
color8  #505050
color9  #ac4142
color10 #7e8d50
color11 #e5b566
color12 #6c99ba
color13 #9e4e85
color14 #7dd5cf
color15 #f5f5f5
